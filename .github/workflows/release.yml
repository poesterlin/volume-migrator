name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty for a dev build without release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build binary (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Compile binary
        run: bun build --compile --minify src/cli.ts --outfile volume-migrator

      - name: Smoke test
        run: ./volume-migrator --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: volume-migrator-linux-x64
          path: volume-migrator
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: volume-migrator-linux-x64

      - name: Rename binary
        run: mv volume-migrator volume-migrator-linux-x64

      - name: Generate checksums
        run: sha256sum volume-migrator-linux-x64 > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            volume-migrator-linux-x64
            checksums.txt
